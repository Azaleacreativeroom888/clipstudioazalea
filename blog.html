<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>疑問ログ（CLIP STUDIO）</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 10px;
    }

    .note {
      color: #666;
      font-size: 0.9em;
    }

    .post {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }

    .meta {
      font-size: 0.8em;
      color: #888;
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      font-size: 1em;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <h1>疑問ログ</h1>
  <p class="note">
    クリスタで詰まったこと・気づき・仮説を雑に残す場所（整理しなくていい）
  </p>

  <!-- サンプル投稿 -->
  <div class="post">
    <div class="meta">2026-04-20</div>
    <h2>レイヤーが重なると色が濁る理由がわからない</h2>
    <p>
      乗算とスクリーンの違いはわかるけど、実際の色変化の直感がまだ弱い。
      とりあえず重ねて試すしかない気がする。
    </p>
  </div>

  <div class="post">
    <div class="meta">2026-04-20</div>
    <h2>ブラシの遅延が気になる</h2>
    <p>
      PC性能なのか設定なのか不明。手ブレ補正を上げすぎてる可能性あり。
      次は補正を下げて検証する。
    </p>
  </div>

</body>
</html>
